<?xml version="1.0" encoding="UTF-8"?>
<!-- Quadcopter drone illustration for Dron-razotkrivač feature -->
<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Propeller guard rings -->
  <circle cx="65" cy="65" r="42" fill="none" stroke="#2a2a2a" stroke-width="5"/>
  <circle cx="235" cy="65" r="42" fill="none" stroke="#2a2a2a" stroke-width="5"/>
  <circle cx="65" cy="235" r="42" fill="none" stroke="#2a2a2a" stroke-width="5"/>
  <circle cx="235" cy="235" r="42" fill="none" stroke="#2a2a2a" stroke-width="5"/>
  <!-- Propeller blades -->
  <ellipse cx="65" cy="65" rx="38" ry="7" fill="#444" transform="rotate(-45 65 65)"/>
  <ellipse cx="235" cy="65" rx="38" ry="7" fill="#444" transform="rotate(45 235 65)"/>
  <ellipse cx="65" cy="235" rx="38" ry="7" fill="#444" transform="rotate(45 65 235)"/>
  <ellipse cx="235" cy="235" rx="38" ry="7" fill="#444" transform="rotate(-45 235 235)"/>
  <!-- Motor hubs -->
  <circle cx="65" cy="65" r="10" fill="#222"/>
  <circle cx="235" cy="65" r="10" fill="#222"/>
  <circle cx="65" cy="235" r="10" fill="#222"/>
  <circle cx="235" cy="235" r="10" fill="#222"/>
  <!-- Arms -->
  <line x1="150" y1="150" x2="65" y2="65" stroke="#333" stroke-width="11" stroke-linecap="round"/>
  <line x1="150" y1="150" x2="235" y2="65" stroke="#333" stroke-width="11" stroke-linecap="round"/>
  <line x1="150" y1="150" x2="65" y2="235" stroke="#333" stroke-width="11" stroke-linecap="round"/>
  <line x1="150" y1="150" x2="235" y2="235" stroke="#333" stroke-width="11" stroke-linecap="round"/>
  <!-- Central body -->
  <rect x="118" y="118" width="64" height="58" rx="10" fill="#1a1a1a" stroke="#555" stroke-width="2"/>
  <!-- Landing legs -->
  <line x1="130" y1="176" x2="125" y2="192" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="170" y1="176" x2="175" y2="192" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="118" y1="192" x2="137" y2="192" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="163" y1="192" x2="182" y2="192" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <!-- Camera gimbal -->
  <circle cx="150" cy="165" r="14" fill="#222" stroke="#666" stroke-width="1.5"/>
  <circle cx="150" cy="165" r="9" fill="#0a1828"/>
  <circle cx="150" cy="165" r="5" fill="#1a3a5c"/>
  <circle cx="148" cy="163" r="2" fill="white" opacity="0.4"/>
  <!-- Status LEDs -->
  <circle cx="126" cy="126" r="3.5" fill="#cc2200"/>
  <circle cx="174" cy="126" r="3.5" fill="#00bb44"/>
  <!-- Infrared emitter -->
  <circle cx="150" cy="178" r="3" fill="#8800cc" opacity="0.85"/>
</svg>
